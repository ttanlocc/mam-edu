today_blocks:
  - id: B1
    kind: WRITING
    kind_color: butter
    time: 07:00–08:30
    duration: 90
    title: Task 2 · Discussion type
    prompt: >-
      Some people believe smartphones are destroying real-life social interaction.
      Others argue they help people stay connected. Discuss both views and give your own opinion.
    tasks:
      - { t: Outline · TS · EX · EG · LK cho 4 đoạn, m: 10 }
      - { t: Viết full essay · 250+ từ · timed 40′, m: 40 }
      - { t: Self-review · 4 tiêu chí descriptor, m: 30 }
      - { t: So sánh Simon model answer, m: 10 }
    reward_seeds: 35
    href: '#/writing'

  - id: B2
    kind: SPEAKING
    kind_color: sky
    time: 09:00–10:00
    duration: 60
    title: Ghi âm + shadow TED
    prompt: Cambridge 18 · Test 2 · Part 2 — Describe a person who has influenced your career choice.
    tasks:
      - { t: Ghi âm Part 1 + Part 2 + Part 3, m: 20 }
      - { t: Transcribe Part 2 · chấm descriptor, m: 15 }
      - { t: Shadow TED 90s "How to speak so people listen", m: 15 }
      - { t: ELSA Speak · word stress · weak forms, m: 10 }
    reward_seeds: 22
    href: '#/'

  - id: B3
    kind: READING
    kind_color: coral
    time: 14:00–14:45
    duration: 45
    title: Cambridge 15 · Test 2 · Passage 3
    prompt: 13 câu · Matching Headings + True/False/NG + Summary completion
    tasks:
      - { t: 1 passage timed 17′, m: 17 }
      - { t: Error analysis · 3-column log, m: 28 }
    reward_seeds: 22
    href: '#/'
    carry_in: { extra_minutes: 45, task_added: bù Cambridge 15 · Test 1 · P3 }

  - id: B4
    kind: LISTENING
    kind_color: sage
    time: 19:00–19:45
    duration: 45
    title: Section 4 + dictation
    prompt: Cambridge 16 · Test 1 · Section 4 · "Coastal erosion" · 10 câu
    tasks:
      - { t: Section 4 timed 10′, m: 10 }
      - { t: Dictation · pause 5–10 từ, m: 15 }
      - { t: BBC R4 "Coastlines" extensive 20′, m: 20 }
    reward_seeds: 18
    href: '#/'

  - id: B5
    kind: ANKI
    kind_color: mocha
    time: Bookends
    duration: 20
    title: 15 mới · 142 review
    prompt: Topic-tagged · Technology + Environment
    tasks:
      - { t: Sáng · 15 thẻ mới · production, m: 10 }
      - { t: Tối · 142 review (bao gồm +22 SRS), m: 10 }
    reward_seeds: 8
    href: '#/'
    carry_in: { extra_minutes: 0, task_added: +22 thẻ SRS từ hôm qua }

